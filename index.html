<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>LINNY'S Alex g collection</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>🎵 LINNY'S Alex g collection</h1>
    <p>Enjoy some of my favorite tracks</p>
  </header>

  <nav>
    <button class="albumBtn" data-target="#album1">Alex G Album</button>
    <button class="albumBtn" data-target="#album2">the 1975</button>
  </nav>

  <main>
    <!-- Album 1 -->
    <section id="album1" class="album">
      <h2 id="a1">Alex G  </h2>
      <div class="song-card">
        <img src="images/cover1.jpg" alt="Cover 1" width="100" height="100" />
        <h3>Things To Do</h3>
        <audio controls>
          <source src="songs/song1.mp3" type="audio/mpeg" />
          Your browser does not support the audio element.
        </audio>
      </div>

      <div class="song-card">
        <img src="images/cover2.jpg" alt="Cover 2" width="100" height="100" />
        <h3>Mary</h3>
        <audio controls>
          <source src="songs/song2.mp3" type="audio/mpeg" />
          Your browser does not support the audio element.
        </audio>
      </div>

      <div class="song-card">
        <img src="images/cover3.jpg" alt="Cover 3" width="100" height="100" />
        <h3>Harvey</h3>
        <audio controls>
          <source src="songs/song3.mp3" type="audio/mpeg" />
          Your browser does not support the audio element.
        </audio>
      </div>
    </section>

    <!-- Album 2 -->
    <section id="album2" class="album" style="display: none">
      <h2>The 1975</h2>
      <div class="song-card">
        <img src="images/cover4.jpg" alt="Cover 4" width="100" height="100" />
        <h3>About u</h3>
        <audio controls>
          <source src="songs/song4.mp3" type="audio/mpeg" />
          Your browser does not support the audio element.
        </audio>
      </div>
      <div class="song-card">
        <img src="images/cover5.jpg" alt="Cover 5" width="100" height="100" />
        <h3>Robbers</h3>
        <audio controls>
          <source src="songs/song5.mp3" type="audio/mpeg" />
          Your browser does not support the audio element.
        </audio>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 My Music Zone. All rights reserved.</p>
  </footer>

  <script>
    document.querySelectorAll('.albumBtn').forEach(function (btn) {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.album').forEach(el => el.style.display = 'none');
        document.querySelector(btn.dataset.target).style.display = 'flex';
      });
    });
  </script>
  <script>
    // Ensure only one <audio> plays at a time
    (function () {
      let currentAudio = null;
      const audios = document.querySelectorAll('audio');
      audios.forEach(a => {
        // when an audio starts playing, pause any other playing audio
        a.addEventListener('play', function () {
          if (currentAudio && currentAudio !== a) {
            try { currentAudio.pause(); currentAudio.currentTime = 0; } catch (e) {}
          }
          currentAudio = a;
        });
        // clear reference when ended or paused (optional)
        a.addEventListener('ended', function () { if (currentAudio === a) currentAudio = null; });
        a.addEventListener('pause', function () { if (currentAudio === a && a.ended) currentAudio = null; });
      });
    })();
  </script>
</body>
</html>
